<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>diagrams-canvas-json Dev</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        margin: 0;
        padding: 20px;
        background: #f5f5f5;
      }
      h1 {
        margin-top: 0;
      }
      .example-list {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }
      .example-list a {
        padding: 8px 16px;
        background: #007bff;
        color: white;
        text-decoration: none;
        border-radius: 4px;
      }
      .example-list a:hover {
        background: #0056b3;
      }
      .example-list a.active {
        background: #0056b3;
      }
      .canvas-container {
        background: white;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 20px;
        display: inline-block;
      }
      #diagram-canvas {
        display: block;
      }
      .status {
        margin-top: 10px;
        padding: 10px;
        background: #e9ecef;
        border-radius: 4px;
        font-family: monospace;
        font-size: 14px;
      }
      .status.error {
        background: #f8d7da;
        color: #721c24;
      }
      .status.success {
        background: #d4edda;
        color: #155724;
      }
    </style>
  </head>
  <body>
    <h1>diagrams-canvas-json Dev Server</h1>

    <nav class="example-list">
      <a href="?example=basic">Basic</a>
      <a href="?example=shapes">Shapes</a>
      <a href="?example=paths">Paths</a>
      <a href="?example=transforms">Transforms</a>
    </nav>

    <div class="canvas-container">
      <canvas id="diagram-canvas"></canvas>
    </div>

    <div id="status" class="status">Loading...</div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
