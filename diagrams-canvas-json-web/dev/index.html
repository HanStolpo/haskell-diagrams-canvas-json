<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>diagrams-canvas-json Dev</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        margin: 0;
        padding: 20px;
        background: #f5f5f5;
      }
      h1 {
        margin-top: 0;
      }
      .header-row {
        display: flex;
        align-items: baseline;
        gap: 20px;
        margin-bottom: 10px;
      }
      .header-row p {
        margin: 0;
        color: #666;
        font-size: 14px;
      }
      .status {
        margin-bottom: 20px;
        padding: 10px;
        background: #e9ecef;
        border-radius: 4px;
        font-family: monospace;
        font-size: 14px;
      }
      .status.error {
        background: #f8d7da;
        color: #721c24;
      }
      .status.success {
        background: #d4edda;
        color: #155724;
      }
      .pane-labels {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 0;
        margin-bottom: 5px;
        padding: 0 10px;
      }
      .pane-label {
        font-size: 12px;
        font-weight: 600;
        color: #666;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .pane-label:last-child {
        text-align: left;
        padding-left: 20px;
      }
      .examples-container {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .example-card {
        background: white;
        border: 1px solid #ddd;
        border-radius: 8px;
        overflow: hidden;
      }
      .example-header {
        background: #333;
        color: white;
        padding: 10px 15px;
        font-weight: 600;
        font-size: 14px;
      }
      .example-content {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        min-height: 250px;
      }
      .example-pane {
        padding: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
      }
      .svg-pane {
        background: white;
        border-right: 1px solid #ddd;
      }
      .svg-pane img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }
      .svg-pane.loading,
      .canvas-pane.loading {
        color: #666;
        font-style: italic;
      }
      .svg-pane.error,
      .canvas-pane.error {
        color: #dc3545;
        font-size: 12px;
      }
      .canvas-pane {
        background: #fafafa;
      }
      .canvas-pane canvas {
        border: 1px dashed #ccc;
        background: white;
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }
      .pixi-pane {
        background: #fafafa;
        border-left: 1px solid #ddd;
      }
      .pixi-pane canvas {
        border: 1px dashed #ccc;
        background: white;
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }
      .pixi-pane.loading {
        color: #666;
        font-style: italic;
      }
      .pixi-pane.error {
        color: #dc3545;
        font-size: 12px;
      }
      .placeholder-text {
        color: #999;
        font-style: italic;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="header-row">
      <h1>diagrams-canvas-json Dev Server</h1>
      <p>Left: diagrams-svg | Middle: Canvas 2D | Right: PixiJS</p>
    </div>

    <div id="status" class="status">Loading examples...</div>

    <div id="examples" class="examples-container"></div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
